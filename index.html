<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iContent AI - Elite SEO Writer</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: #0b1121;
        background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #0b1121 60%);
        background-attachment: fixed;
        color: #f1f5f9;
        line-height: 1.6;
      }
      
      /* Semantic HTML Styling for SEO Ranking */
      .prose h1 {
        font-size: 3rem !important;
        font-weight: 800 !important;
        line-height: 1.2 !important;
        color: #ffffff !important;
        margin-bottom: 2rem !important;
        background: linear-gradient(to right, #60a5fa, #34d399);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      
      .prose h2 {
        font-size: 2rem !important;
        font-weight: 700 !important;
        color: #f1f5f9 !important;
        margin-top: 3.5rem !important;
        margin-bottom: 1.5rem !important;
        padding-bottom: 0.75rem !important;
        border-bottom: 2px solid #1e293b !important;
        display: flex;
        align-items: center;
      }
      
      .prose h2::before {
        content: "";
        width: 12px;
        height: 12px;
        background: #3b82f6;
        border-radius: 2px;
        margin-right: 12px;
        display: inline-block;
      }

      .prose h3 {
        font-size: 1.5rem !important;
        color: #3b82f6 !important;
        font-weight: 600 !important;
        margin-top: 2rem !important;
      }

      .prose p {
        margin-bottom: 1.5rem !important;
        font-size: 1.125rem !important;
        color: #cbd5e1 !important;
        text-align: justify;
      }

      .prose strong { color: #ffffff !important; font-weight: 700 !important; }

      .prose blockquote {
        border-left: 6px solid #3b82f6 !important;
        background: rgba(30, 41, 59, 0.5) !important;
        padding: 2rem !important;
        margin: 3rem 0 !important;
        border-radius: 0 1.5rem 1.5rem 0 !important;
        font-style: italic !important;
        font-size: 1.25rem !important;
        color: #93c5fd !important;
      }

      /* Callout Boxes */
      .prose .expert-callout {
        background: linear-gradient(135deg, rgba(30, 58, 138, 0.3), rgba(15, 23, 42, 0.6));
        border: 1px solid rgba(59, 130, 246, 0.3);
        padding: 2.5rem;
        border-radius: 2rem;
        margin: 4rem 0;
        box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        position: relative;
      }

      .prose .pro-tip {
        background: rgba(16, 185, 129, 0.1);
        border-left: 4px solid #10b981;
        padding: 1.5rem 2rem;
        border-radius: 0.75rem;
        color: #6ee7b7;
        margin: 2.5rem 0;
        display: flex;
        align-items: flex-start;
        gap: 12px;
      }

      /* Responsive Table Wrapper */
      .table-wrapper {
        overflow-x: auto;
        margin: 3rem 0;
        border-radius: 1.25rem;
        border: 1px solid #334155;
        background: rgba(15, 23, 42, 0.3);
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      }

      .prose table {
        width: 100%;
        margin: 0 !important;
        border-collapse: collapse;
        border: none !important;
      }

      .prose th {
        background: #1e293b !important;
        color: #ffffff !important;
        padding: 1.25rem !important;
        text-transform: uppercase;
        font-size: 0.75rem;
        letter-spacing: 0.1em;
        text-align: left;
      }

      .prose td {
        padding: 1.25rem !important;
        border-bottom: 1px solid #1e293b !important;
        background: transparent !important;
      }

      .prose tr:last-child td {
        border-bottom: none;
      }

      /* Custom Image Caption */
      .prose .img-caption {
        text-align: center;
        font-size: 0.95rem;
        color: #94a3b8;
        margin-top: -1rem;
        margin-bottom: 2.5rem;
        font-style: italic;
        display: block;
      }

      /* Custom Lists */
      .prose ul {
        list-style: none !important;
        padding-left: 0 !important;
      }

      .prose ul li {
        position: relative;
        padding-left: 2rem !important;
        margin-bottom: 0.75rem !important;
      }

      .prose ul li::before {
        content: "→";
        position: absolute;
        left: 0;
        color: #3b82f6;
        font-weight: bold;
      }

      /* Image Placeholder Styling */
      .prose .image-placeholder {
        background: rgba(59, 130, 246, 0.05);
        border: 2px dashed rgba(59, 130, 246, 0.3);
        padding: 2rem;
        border-radius: 1rem;
        text-align: center;
        margin: 3rem 0;
        color: #60a5fa;
        font-weight: 500;
        font-style: italic;
      }

      /* Custom Lead Hook Style */
      .prose .lead-hook {
        font-size: 1.5rem;
        font-weight: 500;
        color: #94a3b8;
        border-left: 2px solid #334155;
        padding-left: 1.5rem;
        margin: 2rem 0;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-markdown": "https://esm.sh/react-markdown@^10.1.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.35.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
